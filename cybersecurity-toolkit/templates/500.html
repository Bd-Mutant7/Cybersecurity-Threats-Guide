{% extends "base.html" %}

{% block title %}500 Server Error - Cybersecurity Toolkit{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center py-5">
            <div class="error-template">
                <h1 class="display-1 text-danger">500</h1>
                <h2 class="mb-4">Internal Server Error</h2>
                <div class="error-details mb-4">
                    <i class="fas fa-exclamation-triangle fa-4x mb-3"></i>
                    <p class="lead">Something went wrong on our end. We're working to fix it.</p>
                </div>
                <div class="error-actions">
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg me-2">
                        <i class="fas fa-home me-2"></i>Go Home
                    </a>
                    <a href="javascript:location.reload()" class="btn btn-outline-secondary btn-lg">
                        <i class="fas fa-sync-alt me-2"></i>Try Again
                    </a>
                </div>
            </div>
            <div class="mt-4">
                <p class="text-muted">
                    If the problem persists, please <a href="#" class="text-primary">contact support</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
